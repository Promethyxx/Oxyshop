[package]
name = "oxyshop"
version = "0.3.0"
edition = "2024"

[dependencies]
base64 = "0.22"
dirs = "6"
reqwest = { version = "0.13.2", features = ["blocking", "json"] }
rfd = "0.17.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
slint = "1.9"

[build-dependencies]
slint-build = "1.9"

[target.'cfg(target_os = "windows")'.build-dependencies]
winresource = "0.1"

[package.metadata.android]
package   = "io.github.promethyxx.oxyshop"
resources = "assets/res"
