[package]
name = "oxyshop"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]
slint = "1.7"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
reqwest = { version = "0.13.2", features = ["blocking", "json", "rustls"] }
base64 = "0.22"
dirs = "6.0.0"

[build-dependencies]
slint-build = "1.7"